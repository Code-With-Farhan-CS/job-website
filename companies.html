<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Companies - HireFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="companies">
  <header class="site-header">
    <nav class="navbar container" aria-label="Primary navigation">
      <a class="brand" href="index.html"><span class="brand-mark">HF</span><span>HireFlow</span></a>
      <button class="icon-btn menu-toggle" type="button" aria-label="Open menu" aria-expanded="false"><span></span><span></span><span></span></button>
      <div class="nav-menu" id="navMenu">

        <a class="nav-link active" href="companies.html">Companies</a>

        <a class="btn btn-primary" href="index.html#post-job">Post a Job</a>
      </div>
    </nav>
  </header>

  <main class="page-shell container">
    <section class="page-heading">
      <span class="section-kicker">Browse companies</span>
      <h1>Teams hiring on HireFlow</h1>
